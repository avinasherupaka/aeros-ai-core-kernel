# Multi-tenant local stack — spins up two isolated sample facilities at once.
#
#   docker compose -f environments/local/docker-compose.multi.yml up --build
#
# Each tenant gets its own network + Postgres + API + UI, selected purely by the
# AREOS_TENANT env var. The core image is identical across tenants (config-driven).
#
#   Acme Pharma (two sites)   -> API :8030  UI :3030
#   Nova Bio (one site)       -> API :8040  UI :3040
#
# Paths are relative to the repo root (../../).

x-areos-python-build: &areos-python-build
  context: ../../
  dockerfile_inline: |
    FROM python:3.11-slim
    WORKDIR /app
    ENV PYTHONDONTWRITEBYTECODE=1 PYTHONUNBUFFERED=1 PYTHONPATH=/app/src
    COPY pyproject.toml README.md /app/
    COPY src /app/src
    RUN pip install --no-cache-dir .

services:
  # ─────────────────────── Parity tenant: acme_pharma ─────────────────────────
  # Two sites (green + yellow) are returned by /cp/floormap.
  api-acme:
    build: *areos-python-build
    working_dir: /app
    command: uvicorn aeros.kernel.api.main:app --host 0.0.0.0 --port 8000
    environment:
      AREOS_MODE: local_mock
      AREOS_TENANT: acme_pharma
      AREOS_TENANTS_DIR: /tenants
      AREOS_DEMO_HEALTH: "1"
      ARTIFACTS_ROOT: /data/artifacts
    ports:
      - "8030:8000"
    volumes:
      - ../../src:/app/src:ro
      - ../../artifacts:/data/artifacts:ro
      - ../../tenants:/tenants:ro
      - tenant_acme_cache:/data/cache
    networks:
      - tenant-acme-net

  ui-acme:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      VITE_API_BASE_URL: http://api-acme:8000
    ports:
      - "3030:3000"
    depends_on:
      api-acme:
        condition: service_started
    networks:
      - tenant-acme-net

  # ─────────────────────────── Parity tenant: nova_bio ───────────────────────
  # One red site is returned by /cp/floormap for active-alert rendering.
  api-nova:
    build: *areos-python-build
    working_dir: /app
    command: uvicorn aeros.kernel.api.main:app --host 0.0.0.0 --port 8000
    environment:
      AREOS_MODE: local_mock
      AREOS_TENANT: nova_bio
      AREOS_TENANTS_DIR: /tenants
      AREOS_DEMO_HEALTH: "1"
      ARTIFACTS_ROOT: /data/artifacts
    ports:
      - "8040:8000"
    volumes:
      - ../../src:/app/src:ro
      - ../../artifacts:/data/artifacts:ro
      - ../../tenants:/tenants:ro
      - tenant_nova_cache:/data/cache
    networks:
      - tenant-nova-net

  ui-nova:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      VITE_API_BASE_URL: http://api-nova:8000
    ports:
      - "3040:3000"
    depends_on:
      api-nova:
        condition: service_started
    networks:
      - tenant-nova-net

# Strict network segregation — tenants share no L2 network (mirrors VPC-per-tenant in AWS).
networks:
  tenant-acme-net:
    driver: bridge
  tenant-nova-net:
    driver: bridge

volumes:
  tenant_acme_cache:
  tenant_nova_cache:
